name: calorieapp
description: "AI-powered calorie tracker — snap, confirm, done."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # Networking
  dio: ^5.7.0

  # Camera & images
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image: ^4.2.0
  mobile_scanner: ^5.2.3
  permission_handler: ^11.3.1

  # Animations
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  animations: ^2.0.11

  # Utilities
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.19.0
  uuid: ^4.5.1
  collection: ^1.18.0
  crypto: ^3.0.5

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  confetti: ^0.7.0
  flutter_staggered_animations: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/lottie/

