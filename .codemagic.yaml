workflows:
  Default Workflow:
    name: Flutter Android Release (AAB)
    max_build_duration: 60
    environment:
      flutter: 3.27.1
      xcode: latest
      cocoapods: default
      vars:
        GOOGLE_PACKAGE_NAME: "com.pclub.calorietracker"
        TRACK: "internal"
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $HOME/.pub-cache
    scripts:
      - name: Set up Google credentials
        script: |
          echo $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS > /tmp/sa-key.json
          chmod 644 /tmp/sa-key.json

      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Get version from pubspec
        script: |
          VERSION=$(grep "version:" pubspec.yaml | head -1 | sed 's/version: //' | tr -d ' ')
          MAJOR=$(echo $VERSION | cut -d'+' -f1 | cut -d'.' -f1)
          MINOR=$(echo $VERSION | cut -d'+' -f1 | cut -d'.' -f2)
          BUILD=$(echo $VERSION | cut -d'+' -f2)
          echo "export VERSION_CODE=$BUILD" >> $CM_ENV
          echo "export VERSION_NAME=$MAJOR.$MINOR" >> $CM_ENV
          echo "Package version: $MAJOR.$MINOR ($BUILD)"

      - name: Build AAB (Play Store)
        script: |
          flutter build appbundle \
            --release \
            --no-pub

      - name: Build APK (for testing)
        script: |
          flutter build apk \
            --release \
            --no-pub

      - name: Upload to Play Store (Internal Track)
        script: |
          python3 << 'PYEOF'
          import os, json
          from google.oauth2 import service_account
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build

          SCOPES = ['https://www.googleapis.com/auth/androidpublisher']
          creds = service_account.Credentials.from_service_account_file('/tmp/sa-key.json', scopes=SCOPES)
          auth_req = Request()
          creds.refresh(auth_req)
          service = build('androidpublisher', 'v3', credentials=creds)

          package_name = os.environ.get('GOOGLE_PACKAGE_NAME', 'com.pclub.calorietracker')
          version_code = int(os.environ.get('VERSION_CODE', '1'))
          track = os.environ.get('TRACK', 'internal')
          aab_path = 'build/app/outputs/bundle/release/app-release.aab'

          # Create edit
          edit = service.edits().insert(body={}, packageName=package_name).execute()
          edit_id = edit['id']

          # Upload AAB
          from googleapiclient.http import MediaFileUpload
          media = MediaFileUpload(aab_path, mimetype='application/octet-stream')
          bundle = service.edits().bundles().upload(
            editId=edit_id, packageName=package_name, media_body=media
          ).execute()

          # Assign to track
          service.edits().tracks().update(
            editId=edit_id, packageName=package_name, track=track,
            body={'releases': [{'versionCodes': [str(version_code)], 'status': 'draft'}]}
          ).execute()

          # Commit edit
          service.edits().commit(editId=edit_id, packageName=package_name).execute()

          print(f"✅ Bundle v{bundle['versionCode']} uploaded to {track}!")
          print(f"📦 Visit Play Console: https://play.google.com/console")
          PYEOF

    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - albertlaudia@gmail.com
        notify:
          on_build_success: true
          on_build_failure: true


