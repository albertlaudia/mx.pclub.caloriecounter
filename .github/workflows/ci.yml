name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: [self-hosted,android]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        id: flutter
        with:
          flutter-version: '3.27.1'
          channel: stable

      - name: Set Android SDK path in local.properties
        run: echo "sdk.dir=/opt/android-sdk" >> android/local.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Verify build_runner output is current
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze



  build-android:
    runs-on: [self-hosted,android]
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        id: flutter
        with:
          flutter-version: '3.27.1'

      - name: Set Android SDK path in local.properties
        run: echo "sdk.dir=/opt/android-sdk" >> android/local.properties

      - name: Install Python + googleapiclient
        run: |
          pip install --break-system-packages google-auth google-auth-oauthlib google-api-python-client

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Set up release signing
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > app/release-keystore.jks
          cat > key.properties << EOF
          storeFile=release-keystore.jks
          storePassword=$RELEASE_KEYSTORE_PASSWORD
          keyPassword=$RELEASE_KEYSTORE_PASSWORD
          keyAlias=$RELEASE_KEYSTORE_ALIAS
          EOF
          echo "Release signing configured"
          ls -lh app/release-keystore.jks && echo "KEYSTORE OK" || echo "KEYSTORE MISSING/EMPTY"
          cat key.properties
        working-directory: android
        env:
          RELEASE_KEYSTORE_BASE64: ${{ vars.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ vars.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEYSTORE_ALIAS: ${{ vars.RELEASE_KEYSTORE_ALIAS }}

      - name: Cleanup flutter lockfile before build
        run: rm -f "$FLUTTER_ROOT/bin/cache/lockfile" 2>/dev/null || true
        env:
          FLUTTER_ROOT: ${{ steps.flutter.outputs.FLUTTER_ROOT }}

      - run: flutter build appbundle --release
        env:
          FLUTTER_ROOT: ${{ steps.flutter.outputs.FLUTTER_ROOT }}
          ANDROID_HOME: /opt/android-sdk
          ANDROID_SDK_ROOT: /opt/android-sdk

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep "version:" pubspec.yaml | head -1 | sed 's/version: //' | tr -d ' ')
          VERSION_CODE=$(echo $VERSION | cut -d'+' -f2)
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$(echo $VERSION | cut -d'+' -f1)" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab-v${{ steps.version.outputs.version_code }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload to Play Store (Internal Track)
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          GCLOUD_SERVICE_ACCOUNT_CREDENTIALS: ${{ secrets.GCLOUD_SERVICE_ACCOUNT_CREDENTIALS }}
        run: |
          echo "$GCLOUD_SERVICE_ACCOUNT_CREDENTIALS" > /tmp/sa-key.json
          python3 << 'PYEOF'
          import os
          from google.oauth2 import service_account
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          SCOPES = ['https://www.googleapis.com/auth/androidpublisher']
          creds = service_account.Credentials.from_service_account_file(
              '/tmp/sa-key.json', scopes=SCOPES)
          auth_req = Request()
          creds.refresh(auth_req)
          service = build('androidpublisher', 'v3', credentials=creds)

          package_name = 'com.pclub.calorietracker'
          version_code = int(os.environ.get('VERSION_CODE', '1'))
          aab_path = 'build/app/outputs/bundle/release/app-release.aab'

          print(f"Uploading v{version_code} to Play Store...")

          edit = service.edits().insert(body={}, packageName=package_name).execute()
          edit_id = edit['id']

          media = MediaFileUpload(aab_path, mimetype='application/octet-stream')
          bundle = service.edits().bundles().upload(
              editId=edit_id, packageName=package_name, media_body=media
          ).execute()

          service.edits().tracks().update(
              editId=edit_id, packageName=package_name, track='internal',
              body={'releases': [{'versionCodes': [str(version_code)], 'status': 'draft'}]}
          ).execute()

          try:
              service.edits().commit(editId=edit_id, packageName=package_name).execute()
          except Exception:
              pass  # commit returns empty body on success

          print(f"✅ Bundle v{bundle['versionCode']} uploaded to internal track!")
          print(f"📦 https://play.google.com/console → {package_name} → Internal Testing")
          PYEOF

      - uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk




